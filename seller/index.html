<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ShopWave — Seller Panel</title>
  <link rel="stylesheet" href="../shared/css/global.css">
  <link rel="stylesheet" href="../shared/css/panel.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="sw-loader"><div class="sw-spin"></div><span class="sw-spin-label">LOADING…</span></div>
<div id="sw-toasts"></div>

<div class="panel-shell">

  <!-- ══ SIDEBAR ══════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo-row">
      <div class="sidebar-logo-box">SW</div>
      <div>
        <div class="sidebar-brand">ShopWave</div>
        <div class="sidebar-role">Seller Panel</div>
      </div>
    </div>

    <div class="sidebar-user">
      <img class="sidebar-avatar" id="sb-avatar" src="" alt="avatar"
           onerror="this.src='https://ui-avatars.com/api/?name=S&background=ff4d00&color=fff'">
      <div>
        <div class="sidebar-uname" id="sb-name">Loading…</div>
        <div class="sidebar-uemail" id="sb-email"></div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">Overview</div>
      <button class="nav-item active" data-page="dashboard" onclick="go('dashboard',this)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>

      <div class="nav-section">Products</div>
      <button class="nav-item" data-page="products" onclick="go('products',this)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        My Products
      </button>
      <button class="nav-item" data-page="add-product" onclick="go('add-product',this)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Add Product
      </button>

      <div class="nav-section">Sales</div>
      <button class="nav-item" data-page="orders" onclick="go('orders',this)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Orders
        <span class="n-badge hidden" id="order-badge">0</span>
      </button>

      <div class="nav-section">Account</div>
      <button class="nav-item" data-page="profile" onclick="go('profile',this)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Profile
      </button>
    </nav>

    <div class="sidebar-foot">
      <button class="sidebar-logout" onclick="doSignOut()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <div class="sidebar-veil" id="sb-veil" onclick="closeSidebar()"></div>

  <!-- ══ MAIN ══════════════════════════════════════════════ -->
  <main class="panel-main">
    <header class="panel-topbar">
      <button class="topbar-hamburger" onclick="openSidebar()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="22" height="22"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="topbar-title" id="page-title">Dashboard</span>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-icon" onclick="toggleTheme()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="19" height="19"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </header>

    <div class="panel-content" id="panel-content"><!-- rendered by JS --></div>
  </main>
</div>

<!-- ══ MODAL ══════════════════════════════════════════════ -->
<div class="modal-backdrop" id="modal">
  <div class="modal-box" style="max-width:660px">
    <div class="modal-head">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModal('modal')">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script src="../shared/js/config.js"></script>
<script src="app.js"></script>
</body>
</html>
