<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ShopWave</title>
  <link rel="stylesheet" href="shared/css/global.css">
  <link rel="stylesheet" href="shared/css/user.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="sw-loader"><div class="sw-spin"></div><span class="sw-spin-label">LOADING…</span></div>
<div id="sw-toasts"></div>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<header class="site-header">
  <div class="site-header-inner">
    <div class="site-brand" onclick="go('home')">
      <div class="site-brand-box">SW</div>
      <span>ShopWave</span>
    </div>

    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input id="hdr-search" class="search-bar" type="text" placeholder="Search products, brands…" autocomplete="off">
      <div id="search-drop" class="search-drop"></div>
    </div>

    <div class="header-actions">
      <!-- Cart -->
      <button class="hbtn" onclick="go('cart')" title="Cart">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.63.63-.18 1.7.7 1.7H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        <span class="cart-bubble js-cart-count" style="display:none">0</span>
      </button>
      <!-- Orders -->
      <button class="hbtn" onclick="requireAuth(()=>go('orders'))" title="Orders">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span class="hide-sm">Orders</span>
      </button>
      <!-- User -->
      <div id="hdr-user"></div>
      <!-- Theme -->
      <button class="hbtn btn-icon" onclick="toggleTheme()" title="Toggle theme">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- ══ MAIN ═══════════════════════════════════════════════ -->
<main class="site-main" id="app"></main>

<!-- ══ BOTTOM NAV (mobile) ════════════════════════════════ -->
<nav class="bottom-nav">
  <button class="bnav-item" data-page="home"    onclick="go('home')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Home
  </button>
  <button class="bnav-item" data-page="search"  onclick="go('search')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    Search
  </button>
  <button class="bnav-item" data-page="cart"    onclick="go('cart')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.63.63-.18 1.7.7 1.7H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
    Cart
  </button>
  <button class="bnav-item" data-page="orders"  onclick="requireAuth(()=>go('orders'))">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Orders
  </button>
  <button class="bnav-item" data-page="profile" onclick="requireAuth(()=>go('profile'))">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    Profile
  </button>
</nav>

<script src="shared/js/config.js"></script>
<script src="app.js"></script>
</body>
</html>
